<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TikTok Ads Manager Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind 配置 -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              tiktok: {
                black: '#000000',
                cyan: '#25F4EE',
                magenta: '#FE2C55',
                gray: '#F1F1F2',
              }
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
    <!-- React 依赖映射 -->
    <script type="importmap">
      {
        "imports": {
          "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
          "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
          "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
          "recharts": "https://aistudiocdn.com/recharts@^3.5.0"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- React 核心代码（模块类型） -->
    <script type="module">
      // 导入 React 和 ReactDOM
      import React from 'react';
      import ReactDOM from 'react-dom';

      // 定义主组件（基础 TikTok Ads 管理页面）
      function App() {
        return (
          <div className="min-h-screen bg-white">
            {/* 导航栏 */}
            <nav className="bg-tiktok-black text-white py-4 px-6 flex justify-between items-center">
              <h1 className="text-2xl font-bold flex items-center gap-2">
                <span className="text-tiktok-cyan">TikTok</span> Ads Manager Pro
              </h1>
              <div className="flex gap-6">
                <a href="#" className="hover:text-tiktok-cyan transition-colors">Dashboard</a>
                <a href="#" className="hover:text-tiktok-cyan transition-colors">Campaigns</a>
                <a href="#" className="hover:text-tiktok-cyan transition-colors">Analytics</a>
                <a href="#" className="hover:text-tiktok-cyan transition-colors">Settings</a>
              </div>
            </nav>

            {/* 主内容区 */}
            <main className="px-6 py-8 max-w-7xl mx-auto">
              <div className="bg-tiktok-gray rounded-lg p-8 mb-8">
                <h2 className="text-3xl font-semibold text-tiktok-black mb-4">Welcome to TikTok Ads Manager Pro</h2>
                <p className="text-gray-700 mb-6">Optimize your TikTok ad campaigns with AI-powered insights and tools.</p>
                <button className="bg-tiktok-magenta text-white px-6 py-3 rounded-md hover:bg-opacity-90 transition-colors font-medium">
                  Create New Campaign
                </button>
              </div>

              {/* 数据卡片示例 */}
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div className="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                  <h3 className="text-gray-500 mb-2">Total Impressions</h3>
                  <p className="text-3xl font-bold text-tiktok-black">1.2M+</p>
                </div>
                <div className="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                  <h3 className="text-gray-500 mb-2">CTR</h3>
                  <p className="text-3xl font-bold text-tiktok-cyan">4.8%</p>
                </div>
                <div className="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                  <h3 className="text-gray-500 mb-2">Conversion Rate</h3>
                  <p className="text-3xl font-bold text-tiktok-magenta">2.1%</p>
                </div>
              </div>
            </main>

            {/* 页脚 */}
            <footer className="bg-tiktok-black text-white py-6 px-6 mt-12">
              <div className="max-w-7xl mx-auto text-center text-sm">
                © 2026 TikTok Ads Manager Pro | All Rights Reserved
              </div>
            </footer>
          </div>
        );
      }

      // 将组件挂载到 root 容器
      ReactDOM.render(<App />, document.getElementById('root'));
    </script>
  </body>
</html>
